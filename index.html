<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatSidvix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a0b0b; color: white; font-family: sans-serif; overflow: hidden; }
        .bg-vinho-dark { background-color: #3d0a0a; }
        .msg-me { background-color: #5c0f0f; align-self: flex-end; border-radius: 12px 0 12px 12px; border: 1px solid #7a1414; }
        .msg-other { background-color: #262626; align-self: flex-start; border-radius: 0 12px 12px 12px; }
        #chat-window { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .input-dark { background-color: #2a0e0e; border: 1px solid #4d1010; color: white; padding: 15px; border-radius: 12px; outline: none; width: 100%; max-width: 320px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="auth-screen" class="fixed inset-0 bg-[#1a0b0b] z-50 flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
        <h1 class="text-4xl font-bold mb-8 text-red-600">WhatSidvix</h1>
        
        <div id="photo-section" class="relative mb-6">
            <img id="preview-img" src="https://via.placeholder.com/100" class="w-28 h-28 rounded-full border-4 border-red-800 object-cover bg-zinc-800">
            <label for="profile-upload" class="absolute bottom-0 right-0 bg-red-600 p-3 rounded-full cursor-pointer shadow-lg">
                <i class="fas fa-camera text-white"></i>
            </label>
            <input type="file" id="profile-upload" class="hidden" accept="image/*">
            <p id="photo-label" class="text-xs text-gray-400 mt-2">Toque para escolher foto</p>
        </div>

        <div class="flex flex-col gap-3 w-full items-center">
            <input type="text" id="reg-name" placeholder="Seu Nome Completo" class="input-dark">
            <input type="email" id="reg-email" placeholder="E-mail" class="input-dark">
            <input type="password" id="reg-pass" placeholder="Senha" class="input-dark">
            
            <button id="btn-auth" onclick="executarAcao()" class="bg-red-700 w-full max-w-[320px] py-4 mt-4 rounded-full font-bold text-lg shadow-xl active:scale-95 transition">CRIAR MINHA CONTA</button>
            
            <p class="mt-6 text-gray-400">
                <span id="toggle-text">Já tem uma conta?</span> 
                <button onclick="alternarTela()" id="toggle-link" class="text-red-500 font-bold ml-1 underline">Fazer Login</button>
            </p>
        </div>
    </div>

    <header class="bg-vinho-dark p-3 flex items-center justify-between shadow-2xl">
        <div class="flex items-center gap-3">
            <i class="fas fa-arrow-left text-gray-300"></i>
            <img id="header-avatar" src="" class="w-10 h-10 rounded-full border border-red-900 object-cover">
            <div>
                <h2 class="font-bold text-sm" id="chat-title">WhatSidvix</h2>
                <span class="text-[10px] text-green-500">● Online</span>
            </div>
        </div>
        <div class="flex gap-5 text-gray-300 mr-2">
            <i class="fas fa-video"></i>
            <i class="fas fa-phone"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <main id="chat-window">
        </main>

    <footer class="p-3 bg-[#1a0b0b] flex items-center gap-2">
        <div class="flex-1 bg-zinc-900 rounded-full flex items-center px-4 py-3 gap-3">
            <i class="far fa-smile text-gray-400 text-xl"></i>
            <input type="text" id="msg-input" placeholder="Mensagem" class="bg-transparent flex-1 outline-none text-white text-sm">
            <i class="fas fa-paperclip text-gray-400 -rotate-45"></i>
            <i class="fas fa-camera text-gray-400"></i>
        </div>
        <button onclick="enviarMensagem()" class="bg-red-700 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg">
            <i class="fas fa-paper-plane text-sm"></i>
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÃO DO SEU FIREBASE (PRINT 7192)
        const firebaseConfig = {
            apiKey: "COLE_AQUI_SUA_API_KEY",
            authDomain: "whatsidvix.firebaseapp.com",
            projectId: "whatsidvix",
            storageBucket: "whatsidvix.appspot.com",
            messagingSenderId: "842481043245",
            appId: "COLE_AQUI_SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let modoLogin = false;
        let fotoPerfil = "https://via.placeholder.com/150";

        // Selecionar foto da Galeria
        document.getElementById('profile-upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                fotoPerfil = reader.result;
                document.getElementById('preview-img').src = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // Alternar entre Cadastro e Login
        window.alternarTela = () => {
            modoLogin = !modoLogin;
            document.getElementById('btn-auth').innerText = modoLogin ? "ENTRAR NO CHAT" : "CRIAR MINHA CONTA";
            document.getElementById('toggle-text').innerText = modoLogin ? "Não tem conta?" : "Já tem uma conta?";
            document.getElementById('toggle-link').innerText = modoLogin ? "Criar conta agora" : "Fazer Login";
            document.getElementById('reg-name').style.display = modoLogin ? "none" : "block";
            document.getElementById('photo-section').style.display = modoLogin ? "none" : "block";
        };

        window.executarAcao = async () => {
            const email = document.getElementById('reg-email').value;
            const senha = document.getElementById('reg-pass').value;
            const nome = document.getElementById('reg-name').value;

            if (modoLogin) {
                try { await signInWithEmailAndPassword(auth, email, senha); } 
                catch (e) { alert("Erro ao entrar: Verifique e-mail e senha."); }
            } else {
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, senha);
                    await updateProfile(res.user, { displayName: nome, photoURL: fotoPerfil });
                    location.reload(); 
                } catch (e) { alert("Erro ao cadastrar: " + e.message); }
            }
        };

        window.enviarMensagem = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || !auth.currentUser) return;
            await addDoc(collection(db, "mensagens"), {
                texto: input.value,
                nome: auth.currentUser.displayName,
                uid: auth.currentUser.uid,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        onSnapshot(query(collection(db, "mensagens"), orderBy("timestamp", "asc")), (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.uid === auth.currentUser?.uid;
                win.innerHTML += `
                    <div class="${isMe ? 'msg-me' : 'msg-other'} p-3 max-w-[85%] shadow-sm">
                        ${!isMe ? `<p class="text-[10px] font-bold text-red-400 mb-1">${d.nome}</p>` : ''}
                        <p class="text-[15px]">${d.texto}</p>
                    </div>`;
            });
            win.scrollTop = win.scrollHeight;
        });

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('header-avatar').src = user.photoURL || '';
            }
        });
    </script>
</body>
</html>
