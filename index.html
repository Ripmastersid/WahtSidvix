<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatSidvix</title>

<style>
:root {
  --bg-color: #0f172a;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text-main);

  background:
    radial-gradient(circle at 20% 30%, rgba(59,130,246,0.1), transparent),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,0.08), transparent),
    #0f172a;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
}

/* LOGIN */
#login-container {
  width:90%;
  max-width:400px;
  padding:2rem;
}

input {
  width:100%;
  padding:0.8rem;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

button {
  width:100%;
  padding:0.8rem;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* CHAT */
#chat-container {
  display:none;
  width:100%;
  height:100%;
  flex-direction:column;
}

/* HEADER */
.chat-header {
  display:flex;
  align-items:center;
  padding:1rem;
  background:#0f172a;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.avatar {
  width:45px;
  height:45px;
  border-radius:50%;
  background:var(--accent);
  background-size:cover;
  margin-right:10px;
}

.menu {
  margin-left:auto;
  position:relative;
  cursor:pointer;
}

.dropdown {
  display:none;
  position:absolute;
  right:0;
  top:30px;
  padding:10px;
  min-width:150px;
}

/* MESSAGES */
.messages {
  flex:1;
  overflow:auto;
  padding:1rem;
}

.msg {
  padding:10px;
  background:var(--accent);
  border-radius:10px;
  margin-bottom:10px;
  max-width:70%;
  margin-left:auto;
}

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
  gap:5px;
}

.input-area input {
  flex:1;
}

.icon-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container" class="glass">
  <h2>Entrar</h2>
  <input type="file" id="photo">
  <input type="text" id="name" placeholder="Seu nome">
  <input type="email" id="email" placeholder="Email">
  <input type="password" placeholder="Senha">
  <button id="enter">Entrar</button>
</div>

<!-- CHAT -->
<div id="chat-container">

  <div class="chat-header">
    <div id="avatar" class="avatar"></div>
    <div>
      <div id="username">Usuário</div>
      <small style="color:gray">Online</small>
    </div>

    <div class="menu" id="menuBtn">⋮
      <div class="dropdown glass" id="menu">
        <div id="editName">Editar nome</div>
        <div id="editPhoto">Trocar foto</div>
        <div id="share">Compartilhar</div>
      </div>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="input-area">
    
    <label for="upload" class="icon-btn">
      📷
    </label>
    <input type="file" id="upload" hidden>

    <div class="icon-btn" id="linkBtn">🔗</div>

    <input id="msgInput" placeholder="Mensagem">

    <div class="icon-btn" id="send">➤</div>
  </div>

</div>

<script>

// ELEMENTOS
const login = document.getElementById('login-container')
const chat = document.getElementById('chat-container')
const enter = document.getElementById('enter')

const avatar = document.getElementById('avatar')
const username = document.getElementById('username')

const msgs = document.getElementById('msgs')
const msgInput = document.getElementById('msgInput')

// LOGIN
enter.onclick = () => {
  const name = document.getElementById('name').value
  const file = document.getElementById('photo').files[0]

  if(name) {
    username.innerText = name
    localStorage.setItem('name', name)
  }

  if(file) {
    const reader = new FileReader()
    reader.onload = e => {
      avatar.style.backgroundImage = `url(${e.target.result})`
      localStorage.setItem('photo', e.target.result)
    }
    reader.readAsDataURL(file)
  }

  login.style.display = 'none'
  chat.style.display = 'flex'
}

// LOAD
window.onload = () => {
  const name = localStorage.getItem('name')
  const photo = localStorage.getItem('photo')

  if(name) username.innerText = name
  if(photo) avatar.style.backgroundImage = `url(${photo})`
}

// MENU
const menuBtn = document.getElementById('menuBtn')
const menu = document.getElementById('menu')

menuBtn.onclick = () => {
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block'
}

// EDIT NAME
document.getElementById('editName').onclick = () => {
  const newName = prompt('Novo nome:')
  if(newName){
    username.innerText = newName
    localStorage.setItem('name', newName)
  }
}

// EDIT PHOTO
document.getElementById('editPhoto').onclick = () => {
  document.getElementById('photo').click()
}

// SHARE
document.getElementById('share').onclick = () => {
  if(navigator.share){
    navigator.share({
      title:'WhatSidvix',
      text:'Vem usar esse chat!',
      url:location.href
    })
  }
}

// SEND MSG
document.getElementById('send').onclick = () => {
  if(msgInput.value){
    const div = document.createElement('div')
    div.className = 'msg'
    div.innerText = msgInput.value
    msgs.appendChild(div)
    msgInput.value = ''
  }
}

// ENTER
msgInput.addEventListener('keypress', e=>{
  if(e.key==='Enter') document.getElementById('send').click()
})

// LINK
document.getElementById('linkBtn').onclick = ()=>{
  const url = prompt('Link:')
  if(url){
    const div = document.createElement('div')
    div.className = 'msg'
    div.innerHTML = `<a href="${url}" target="_blank">${url}</a>`
    msgs.appendChild(div)
  }
}

// IMAGE SEND
document.getElementById('upload').onchange = function(){
  const file = this.files[0]
  const reader = new FileReader()

  reader.onload = e=>{
    const img = document.createElement('img')
    img.src = e.target.result
    img.style.maxWidth = '200px'

    const div = document.createElement('div')
    div.className = 'msg'
    div.appendChild(img)

    msgs.appendChild(div)
  }

  reader.readAsDataURL(file)
}

</script>

</body>
</html>
