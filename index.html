<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatSidvix</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  background:#5a1a1a;
  padding:10px;
  display:flex;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  margin-right:10px;
}

.header-info{
  flex:1;
}

.header-icons{
  display:flex;
  gap:15px;
}

/* CHAT */
.chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

.sent{
  background:#ff3b3b;
  margin-left:auto;
}

.received{
  background:#1e1e1e;
}

.time{
  font-size:10px;
  opacity:0.7;
  margin-top:5px;
  text-align:right;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#5a1a1a;
  gap:5px;
}

.input-area input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff3b3b;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar">W</div>
  <div class="header-info">
    <div>WhatSidvix</div>
    <small>Online</small>
  </div>
  <div class="header-icons">
    🔍 📞 ⋮
  </div>
</div>

<div class="chat" id="chat">

  <div class="msg received">
    Olá! Tudo bem?
    <div class="time">10:26</div>
  </div>

  <div class="msg sent">
    Vamos marcar para amanhã?
    <div class="time">20:40</div>
  </div>

</div>

<div class="input-area">
  <div class="btn">📎</div>
  <div class="btn">📷</div>
  <input id="msgInput" placeholder="Digite sua mensagem...">
  <div class="btn" onclick="send()">➤</div>
</div>

<script>

function send(){
  const text = document.getElementById('msgInput').value
  if(!text) return

  const div = document.createElement('div')
  div.className = 'msg sent'
  div.innerHTML = text + `<div class="time">${new Date().getHours()}:${new Date().getMinutes()}</div>`

  document.getElementById('chat').appendChild(div)
  document.getElementById('msgInput').value=''
}

</script>

</body>
</html>
