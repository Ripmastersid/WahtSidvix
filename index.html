<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatSidvix</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  background:#5a1a1a;
  padding:10px;
  display:flex;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  margin-right:10px;
}

.header-info{
  flex:1;
}

.header-icons{
  display:flex;
  gap:15px;
}

/* CHAT */
.chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

.sent{
  background:#ff3b3b;
  margin-left:auto;
}

.received{
  background:#1e1e1e;
}

.time{
  font-size:10px;
  opacity:0.7;
  margin-top:5px;
  text-align:right;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#5a1a1a;
  gap:5px;
}

.input-area input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ff3b3b;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">W</div>
  <div class="header-info">
    <div>WhatSidvix</div>
    <small>Online</small>
  </div>
  <div class="header-icons">
    🔍 📞 ⋮
  </div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- INPUT -->
<div class="input-area">

  <!-- BOTÃO GALERIA -->
  <div class="btn" onclick="document.getElementById('fileInput').click()">📎</div>

  <!-- INPUT ESCONDIDO -->
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <!-- TEXTO -->
  <input id="msgInput" placeholder="Digite sua mensagem...">

  <!-- ENVIAR -->
  <div class="btn" onclick="send()">➤</div>

</div>

<script>

// ENVIAR TEXTO
function send(){
  const input = document.getElementById('msgInput')
  let text = input.value.trim()
  if(!text) return

  // detectar link
  if(text.startsWith('http')){
    text = `<a href="${text}" target="_blank" style="color:#fff">${text}</a>`
  }

  const div = document.createElement('div')
  div.className = 'msg sent'
  div.innerHTML = text + `<div class="time">${hora()}</div>`

  document.getElementById('chat').appendChild(div)
  input.value=''
  scroll()
}

// ENTER
document.getElementById('msgInput').addEventListener('keypress', e=>{
  if(e.key === 'Enter'){
    send()
  }
})

// ENVIAR IMAGEM
document.getElementById('fileInput').onchange = function(){
  const file = this.files[0]
  if(!file) return

  const reader = new FileReader()

  reader.onload = function(e){
    const div = document.createElement('div')
    div.className = 'msg sent'
    div.innerHTML = `<img src="${e.target.result}" style="max-width:200px;border-radius:10px">
    <div class="time">${hora()}</div>`

    document.getElementById('chat').appendChild(div)
    scroll()
  }

  reader.readAsDataURL(file)
}

// HORA
function hora(){
  const d = new Date()
  return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0')
}

// SCROLL
function scroll(){
  const chat = document.getElementById('chat')
  chat.scrollTop = chat.scrollHeight
}

</script>

</body>
</html>
