<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatSidvix</title>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
:root {
  --bg-color: #0f172a;
  --accent: #3b82f6;
  --text-main: #f8fafc;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text-main);
  background:
    radial-gradient(circle at 20% 30%, rgba(59,130,246,0.1), transparent),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,0.08), transparent),
    #0f172a;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
}

#login-container {
  width:90%;
  max-width:400px;
  padding:2rem;
}

input {
  width:100%;
  padding:0.8rem;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:rgba(0,0,0,0.2);
  color:white;
}

button {
  width:100%;
  padding:0.8rem;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

#chat-container {
  display:none;
  width:100%;
  height:100%;
  flex-direction:column;
}

.chat-header {
  display:flex;
  align-items:center;
  padding:1rem;
  background:#0f172a;
}

.avatar {
  width:45px;
  height:45px;
  border-radius:50%;
  background:var(--accent);
  background-size:cover;
  margin-right:10px;
}

.menu {
  margin-left:auto;
  position:relative;
  cursor:pointer;
}

.dropdown {
  display:none;
  position:absolute;
  right:0;
  top:30px;
  padding:10px;
}

.messages {
  flex:1;
  overflow:auto;
  padding:1rem;
}

.msg {
  padding:10px;
  background:var(--accent);
  border-radius:10px;
  margin-bottom:10px;
  max-width:70%;
  margin-left:auto;
}

.input-area {
  display:flex;
  padding:10px;
  gap:5px;
}

.input-area input {
  flex:1;
}

.icon-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="login-container" class="glass">
  <h2>Entrar</h2>
  <input type="file" id="photo">
  <input type="text" id="name" placeholder="Seu nome">
  <input type="email" id="email" placeholder="Email">
  <input type="password" placeholder="Senha">
  <button id="enter">Entrar</button>
</div>

<div id="chat-container">

  <div class="chat-header">
    <div id="avatar" class="avatar"></div>
    <div>
      <div id="username">Usuário</div>
      <small>Online</small>
    </div>

    <div class="menu" id="menuBtn">⋮
      <div class="dropdown glass" id="menu">
        <div id="editName">Editar nome</div>
        <div id="editPhoto">Trocar foto</div>
        <div id="share">Compartilhar</div>
      </div>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="input-area">
    <label for="upload" class="icon-btn">📷</label>
    <input type="file" id="upload" hidden>

    <div class="icon-btn" id="linkBtn">🔗</div>

    <input id="msgInput" placeholder="Mensagem">

    <div class="icon-btn" id="send">➤</div>
  </div>

</div>

<script>

// FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyC6U5qrQ9jBVIDP3K6W7mvfRYhktoKQKzU",
  authDomain: "whatsidvix.firebaseapp.com",
  projectId: "whatsidvix",
  storageBucket: "whatsidvix.firebasestorage.app",
  messagingSenderId: "842481043245",
  appId: "1:842481043245:web:81fd4a9563067711a3f5a4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ELEMENTOS
const login = document.getElementById('login-container')
const chat = document.getElementById('chat-container')
const avatar = document.getElementById('avatar')
const username = document.getElementById('username')
const msgs = document.getElementById('msgs')
const msgInput = document.getElementById('msgInput')

// LOGIN
document.getElementById('enter').onclick = () => {
  const name = document.getElementById('name').value
  const file = document.getElementById('photo').files[0]

  if(name){
    username.innerText = name
    localStorage.setItem('name', name)
  }

  if(file){
    const reader = new FileReader()
    reader.onload = e=>{
      avatar.style.backgroundImage = `url(${e.target.result})`
      localStorage.setItem('photo', e.target.result)
    }
    reader.readAsDataURL(file)
  }

  login.style.display='none'
  chat.style.display='flex'
}

// LOAD
window.onload = ()=>{
  const name = localStorage.getItem('name')
  const photo = localStorage.getItem('photo')

  if(name) username.innerText = name
  if(photo) avatar.style.backgroundImage = `url(${photo})`
}

// MENU
menuBtn.onclick = ()=>{
  menu.style.display = menu.style.display === 'block' ? 'none':'block'
}

// ENVIAR TEXTO (FIREBASE)
send.onclick = async ()=>{
  const text = msgInput.value.trim()
  if(!text) return

  await db.collection("messages").add({
    text,
    name: localStorage.getItem('name'),
    timestamp: Date.now()
  })

  msgInput.value=''
}

// RECEBER TEMPO REAL
db.collection("messages")
.orderBy("timestamp")
.onSnapshot(snapshot=>{
  msgs.innerHTML=''

  snapshot.forEach(doc=>{
    const data = doc.data()
    const div = document.createElement('div')
    div.className='msg'

    if(data.text){
      div.innerHTML = `<strong>${data.name}</strong><br>${data.text}`
    }

    if(data.image){
      div.innerHTML = `<img src="${data.image}" style="max-width:200px;">`
    }

    msgs.appendChild(div)
  })

  msgs.scrollTop = msgs.scrollHeight
})

// UPLOAD IMAGEM
upload.onchange = async function(){
  const file = this.files[0]
  if(!file) return

  const ref = storage.ref('images/'+Date.now())
  await ref.put(file)

  const url = await ref.getDownloadURL()

  await db.collection("messages").add({
    image:url,
    name: localStorage.getItem('name'),
    timestamp: Date.now()
  })
}

// LINK
linkBtn.onclick = ()=>{
  const url = prompt('Link:')
  if(url){
    sendMessage(url)
  }
}

</script>

</body>
</html>
